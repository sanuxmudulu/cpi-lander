<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get Started</title>

  <style>
    :root {
      --red-main: #ff1f3d;
      --red-2: #e50914;
      --red-3: #ff4b5c;
      --bg: #050505;
      --card: rgba(255, 255, 255, 0.035);
      --border: rgba(255, 31, 61, 0.30);
      --text: #ffffff;
      --muted: #b8b8b8;
      --gradient: linear-gradient(90deg, #e50914 0%, #ff1f3d 52%, #ff4b5c 100%);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 20%, rgba(255, 31, 61, 0.16), transparent 34%),
        radial-gradient(circle at 50% 72%, rgba(255, 31, 61, 0.08), transparent 36%),
        var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
    }

    .page {
      width: 100%;
      max-width: 720px;
      padding: 48px 24px 60px;
      text-align: center;
    }

    .logos {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 34px;
    }

    .logo-box {
      width: 70px;
      height: 70px;
      border-radius: 14px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 75, 92, 0.22);
      box-shadow:
        0 0 8px rgba(255, 31, 61, 0.18),
        0 0 26px rgba(255, 31, 61, 0.14);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .x {
      font-size: 22px;
      font-weight: 900;
      color: rgba(255, 255, 255, 0.82);
    }

    h1 {
      font-size: 58px;
      line-height: 1.02;
      letter-spacing: -2px;
      font-weight: 950;
      margin-bottom: 24px;
      color: #ffffff;
      text-shadow:
        0 3px 0 rgba(0, 0, 0, 0.42),
        0 0 24px rgba(255, 31, 61, 0.20);
    }

    .subtitle {
      max-width: 560px;
      margin: 0 auto 34px;
      color: var(--muted);
      font-size: 19px;
      line-height: 1.55;
      font-weight: 500;
    }

    .choice {
      width: 100%;
      max-width: 526px;
      margin: 0 auto 14px;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 25px 20px;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
    }

    .choice:hover {
      transform: translateY(-2px);
    }

    .choice.primary {
      background: var(--gradient);
      color: #ffffff;
      border-color: rgba(255, 75, 92, 0.72);
      box-shadow:
        0 0 30px rgba(255, 31, 61, 0.42),
        0 18px 40px rgba(255, 31, 61, 0.16);
    }

    .choice.secondary {
      background: rgba(255, 255, 255, 0.025);
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.14);
      box-shadow: inset 0 0 24px rgba(255, 31, 61, 0.025);
    }

    .choice.secondary:hover {
      border-color: rgba(255, 31, 61, 0.32);
      box-shadow: 0 0 24px rgba(255, 31, 61, 0.10);
    }

    .choice h2 {
      font-size: 25px;
      line-height: 1.1;
      font-weight: 950;
      margin-bottom: 7px;
    }

    .choice p {
      font-size: 14.5px;
      line-height: 1.35;
      color: rgba(255, 255, 255, 0.86);
    }

    .choice.secondary p {
      color: rgba(255, 255, 255, 0.64);
    }

    @media (max-width: 520px) {
      .page {
        padding: 40px 16px 50px;
      }

      .logo-box {
        width: 62px;
        height: 62px;
      }

      h1 {
        font-size: 42px;
        letter-spacing: -1.4px;
      }

      .subtitle {
        font-size: 16px;
      }

      .choice h2 {
        font-size: 23px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="logos">
      <div class="logo-box">
        <img src="blockblast logo.png" alt="Block Blast Logo" />
      </div>

      <div class="x">x</div>

      <div class="logo-box">
        <img src="testerup logo.jpg" alt="Testerup Logo" />
      </div>
    </header>

    <h1>Get Paid To Game</h1>

    <p class="subtitle">
      Join thousands earning daily by playing popular games like Roblox,
      Subway Surfers, 8 Ball Pool, etc.
    </p>

    <div class="choice primary" onclick="goToOver21()">
      <h2>I'm over 21</h2>
      <p>Instant Payouts: Apple Wallet, Google Wallet, or Wire</p>
    </div>

    <div class="choice secondary" onclick="goToUnder21()">
      <h2>I'm under 21</h2>
      <p>Limited Payouts: Wire Transfer Only</p>
    </div>
  </main>

  <script>
    function getIncomingSource() {
      const params = new URLSearchParams(window.location.search);
      return params.get("source");
    }

    function buildOutgoingLink(baseLink) {
      const source = getIncomingSource();

      if (!source) {
        return baseLink;
      }

      const separator = baseLink.includes("?") ? "&" : "?";
      return baseLink + separator + "source=" + encodeURIComponent(source);
    }

    function goToOver21() {
      window.location.href = buildOutgoingLink("https://perkc2.vercel.app/");
    }

    function goToUnder21() {
      window.location.href = buildOutgoingLink("https://perkc.vercel.app/");
    }
  </script>
</body>
</html>
